PACKAGE_NAME="heart-pi5-scan-loop"
# Keep this in sync with rust/heart_rust/Cargo.toml. The Pi installer also
# rewrites the staged DKMS copy from Cargo.toml so runtime installs do not drift
# if this file is missed during a version bump.
PACKAGE_VERSION="0.1.0"
BUILT_MODULE_NAME[0]="heart_pi5_scan_loop"
BUILT_MODULE_LOCATION[0]="rust/heart_rust/kernel/pi5_scan_loop"
DEST_MODULE_LOCATION[0]="/updates/dkms"
AUTOINSTALL="yes"
MAKE[0]="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/rust/heart_rust/kernel/pi5_scan_loop modules"
CLEAN="make -C /lib/modules/${kernelver}/build M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build/rust/heart_rust/kernel/pi5_scan_loop clean"
